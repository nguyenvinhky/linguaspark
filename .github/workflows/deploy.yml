name: Deploy app to GitHub Pages

# ONE-TIME SETUP (required before the first run):
#   Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
# (Auto-enablement via actions/configure-pages needs write-capable GITHUB_TOKEN
#  which isn't the default on new repos; manual enable is the reliable path.)
#
# Rebuild only when the app content or this workflow changes.
# Design artifacts (design/) and PLAN.md are not shipped to the site.
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Grant the workflow the minimum scopes Pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight Pages deploy when a new one starts.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site artifact
      
        # Copy app/ into _site/ and disable Jekyll so any future underscore-
        # prefixed files are served as-is.
        run: |
          mkdir -p _site
          cp -r app/. _site/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
